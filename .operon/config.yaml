# .operon/config.yaml — this app's registry entry, same schema as apps.yaml
# (docs/architecture.md §1, §9). Emitted by `operon bootstrap` from the
# questionnaire answers. Human-ratified surface: changes land via proposal
# PR; agent writes are gate-critical. schema_version is the public contract
# marker (§1 containment invariant).
#
# cadence: role -> trigger overrides. An entry REPLACES the role's
#   roles.yaml triggers; an EMPTY list disables the role for this app —
#   roles left un-enabled in the questionnaire appear here as [].
# critical_ops: app-specific extensions to the org gate's rule set
#   (§9 step 2: deploy commands, publish targets, secret locations).
# channels: what Support/Marketing watch and draft for, when enabled.
# release: the app's declared release mechanism (A4) — omitted until the
#   app has one. A milestone whose plan requires deploy/package fails the
#   ship gate unless this declares it, e.g.:
#   release: { kind: deploy, command: gh workflow run deploy.yml, owner: orchestrator }

schema_version: 1
org:
  name: cursor-buildstack
  max_concurrent_turns: 2
defaults:
  budget_usd_month: 1000
apps:
  cursor-buildstack:
    repo: bikramgupta/cursor-buildstack
    status: onboarding
    budget_usd_month: 1000
    cadence:
      support: []
      marketing: []
      distiller: []
      learning-reviewer: []
    critical_ops:
      deploy_commands: []
      publish_targets: []
      secret_locations:
        - .env
        - .env.local

# Gate commands used by Operon's loop in fresh worktrees.
setup_command: npm install
test_command: npm test
lint_command: npm run lint
